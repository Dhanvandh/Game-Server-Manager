services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gsm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gsmsecret}
      POSTGRES_DB: ${POSTGRES_DB:-gsm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gsm} -d ${POSTGRES_DB:-gsm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-gsm}:${POSTGRES_PASSWORD:-gsmsecret}@db:5432/${POSTGRES_DB:-gsm}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-me-32chars-min!!}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-dev-refresh-secret-change-me-32!!}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-flask-secret-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://localhost/api/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SERVER_DATA_ROOT: /data/servers
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Comma-separated; passed to spawned game containers (Minecraft) if set. Try if launchermeta.mojang.com fails from inside the container.
      GAME_CONTAINER_DNS: ${GAME_CONTAINER_DNS:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - server_volumes:/data/servers
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  server_volumes:
